<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | FeeHub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { brand: { 50: '#E3FDFD', 100: '#CBF1F5', 500: '#71C9CE', 600: '#5eaeb3' } }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen p-6">
    <div class="bg-white p-10 rounded-2xl shadow-xl w-full max-w-md border border-slate-100">
        <h2 class="text-3xl font-extrabold text-slate-900 mb-2">Set new password</h2>
        <p class="text-slate-500 mb-8">Please enter your new secure password below.</p>
        
        <div id="statusMessage" class="hidden p-4 rounded-xl text-sm font-semibold mb-6"></div>

        <form id="resetForm" class="space-y-5">
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase mb-2">New Password</label>
                <input type="password" id="newPassword" required minlength="6" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-brand-500 focus:ring-4 focus:ring-brand-500/20">
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Confirm Password</label>
                <input type="password" id="confirmPassword" required minlength="6" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-brand-500 focus:ring-4 focus:ring-brand-500/20">
            </div>
            <button type="submit" id="resetBtn" class="w-full bg-brand-500 text-slate-900 px-6 py-3.5 rounded-xl font-bold hover:bg-brand-600 transition-all shadow-lg">Update Password</button>
        </form>
    </div>

    <script>
        
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        const statusDiv = document.getElementById('statusMessage');

        if(!token) {
            statusDiv.classList.remove('hidden');
            statusDiv.classList.add('bg-red-50', 'text-red-600');
            statusDiv.innerHTML = '❌ Invalid or missing reset token.';
            document.getElementById('resetForm').style.display = 'none';
        }

        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const password = document.getElementById('newPassword').value;
            const confirm = document.getElementById('confirmPassword').value;

            if(password !== confirm) {
                statusDiv.classList.remove('hidden', 'bg-brand-50', 'text-brand-700');
                statusDiv.classList.add('bg-red-50', 'text-red-600');
                statusDiv.innerHTML = '❌ Passwords do not match.';
                return;
            }

            document.getElementById('resetBtn').textContent = 'Updating...';

            try {
                const response = await fetch(`http:
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });
                const data = await response.json();

                statusDiv.classList.remove('hidden');
                if(data.success) {
                    statusDiv.classList.remove('bg-red-50', 'text-red-600');
                    statusDiv.classList.add('bg-brand-50', 'text-brand-700');
                    statusDiv.innerHTML = '✅ ' + data.message;
                    setTimeout(() => window.location.href = 'login.html', 3000);
                } else {
                    statusDiv.classList.add('bg-red-50', 'text-red-600');
                    statusDiv.innerHTML = '❌ ' + data.message;
                    document.getElementById('resetBtn').textContent = 'Update Password';
                }
            } catch (err) {
                statusDiv.innerHTML = '❌ Connection Error.';
            }
        });
    </script>
</body>
</html>
