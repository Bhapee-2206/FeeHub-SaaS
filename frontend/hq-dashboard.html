        .delay-200 { animation-delay: 200ms; }
        
        @keyframes fadeIn { to { opacity: 1; } }
        @keyframes slideUp { to { opacity: 1; transform: translateY(0); } }

            background: #ffffff;

        .hq-card {

            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .hq-card:hover {
            border-color: #e2e8f0;
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.02);

        .hq-header {
            background: rgba(255, 255, 255, 0.85);

        .tr-animate { animation: slideInX 0.4s ease-out forwards; opacity: 0; transform: translateX(-10px); }
        @keyframes slideInX { to { opacity: 1; transform: translateX(0); } }

        
        .bg-pattern {
            background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
            background-size: 24px 24px;
            opacity: 0.3;
            position: fixed; inset: 0; z-index: 0; pointer-events: none;
        }
        
        .glass-modal {
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }
    </style>

    <div id="toast" class="fixed bottom-6 right-6 bg-slate-900 text-white px-6 py-4 rounded-xl shadow-2xl transform translate-y-20 opacity-0 transition-all duration-300 z-[200] flex items-center gap-3 font-semibold text-sm">
        <svg class="w-5 h-5 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
        <span id="toastMsg">Notification</span>
    </div>

    <script>
        const token = localStorage.getItem('feehub_token');
        if (!token) window.location.replace('hq-login.html');

        function logout() { 
            localStorage.removeItem('feehub_token'); 
            window.location.replace('hq-login.html'); 
        }

        function showToast(msg, isError = false) {
            const toast = document.getElementById('toast');
            document.getElementById('toastMsg').textContent = msg;
            if(isError) toast.classList.replace('bg-slate-900', 'bg-red-600');
            else toast.classList.replace('bg-red-600', 'bg-slate-900');
            
            toast.classList.remove('translate-y-20', 'opacity-0');
            setTimeout(() => { toast.classList.add('translate-y-20', 'opacity-0'); }, 400);
        }

        const OVElem = document.getElementById('OV');
        const OVContent = document.getElementById('OVContent');

        function openModal() { 
            OVElem.classList.replace('hidden', 'flex');
            setTimeout(() => {
                OVElem.classList.remove('opacity-0', 'pointer-events-none');
                OVContent.classList.remove('scale-95');
                OVContent.classList.add('scale-100');
            }, 10);
        }
        
        function closeModal() { 
            OVElem.classList.add('opacity-0', 'pointer-events-none');
            OVContent.classList.remove('scale-100');
            OVContent.classList.add('scale-95');
            setTimeout(() => {
                OVElem.classList.replace('flex', 'hidden'); 
                document.getElementById('addClientForm').reset(); 
            }, 300);
        }

        async function fetchInstitutions() {
            try {
                const res = await fetch('http:
                const data = await res.json();
                
                if (!data.success) {
                    if(data.message.includes('Access Denied')) {
                        alert("UNAUTHORIZED DEVIATION LOGGED. Super Admin clearance required.");
                        window.location.replace('login.html');
                    }
                    return;
                }

                
                const clients = data.data.filter(i => i.email !== 'hq@feehub.com');

                document.getElementById('statCount').textContent = clients.length;
                const tbody = document.getElementById('clientTableBody');
                
                if (clients.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="4" class="py-16 text-center text-slate-400 font-medium text-[15px] bg-slate-50/50">No client instances detected. Initialize one.</td></tr>`;
                    return;
                }                tbody.innerHTML = clients.map((inst, idx) => {
                    const isSuspended = inst.isActive === false;
                    const statusColor = isSuspended ? 'bg-red-50 text-red-700 border-red-200' : 'bg-emerald-50 text-emerald-700 border-emerald-200';
                    const dotColor = isSuspended ? 'bg-red-500 shadow-[0_0_8px_rgba(239,68,68,0.5)]' : 'bg-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.5)]';
                    const statusText = isSuspended ? 'Suspended' : 'Online';

                    return `
                    <tr class="group hover:bg-slate-50/80 hover:shadow-sm transition-all duration-300 tr-animate bg-white" style="animation-delay: ${idx * 40}ms">
                        <td class="py-5 px-8">
                            <p class="font-black text-slate-800 text-[15.5px] tracking-tight group-hover:text-indigo-600 transition-colors">${inst.name}</p>
                            <p class="text-[10.5px] text-slate-400 font-mono mt-1 tracking-tight">UUID: ${inst._id}</p>
                        </td>
                        <td class="py-5 px-8">
                            <div class="inline-flex items-center gap-2 bg-slate-50 border border-slate-200 px-3 py-1.5 rounded-lg text-[13.5px] text-slate-600 font-semibold shadow-sm">
                                <svg class="w-3.5 h-3.5 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                                ${inst.adminEmail}
                            </div>
                        </td>
                        <td class="py-5 px-8">
                            <div class="inline-flex items-center gap-2 border px-3 py-1.5 rounded-md text-[10.5px] font-black uppercase tracking-widest ${statusColor} transition-colors">
                                <span class="w-2 h-2 rounded-full ${dotColor}"></span> ${statusText}
                            </div>
                        </td>
                        <td class="py-5 px-8">
                            <div class="flex items-center justify-end gap-2 opacity-0 group-hover:opacity-100 transition-opacity duration-300">
                                <button onclick="toggleInstitution('${inst._id}')" class="${isSuspended ? 'text-emerald-600 hover:bg-emerald-50 border-emerald-200' : 'text-amber-600 hover:bg-amber-50 border-amber-200'} font-bold text-[10px] uppercase tracking-wider bg-white px-4 py-2.5 rounded-xl border transition-all flex items-center justify-center gap-1.5 shadow-sm transform hover:-translate-y-0.5">
                                    ${isSuspended ? '▶ Start Instance' : '⏸ Suspend Instance'}
                                </button>
                                <button onclick="deleteInstitution('${inst._id}', '${inst.name}')" class="text-slate-400 hover:text-red-600 font-bold text-[10px] uppercase tracking-wider bg-white hover:bg-red-50 px-4 py-2.5 rounded-xl border border-slate-200 hover:border-red-200 transition-all flex items-center justify-center gap-1.5 shadow-sm transform hover:-translate-y-0.5">
                                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg> Terminate
                                </button>
                            </div>
                        </td>
                    </tr>
                `;}).join('');
            } catch (e) { document.getElementById('loadingRow').innerHTML = `<td colspan="4" class="py-16 text-center text-red-500 font-medium bg-red-50">Error establishing secure link to HQ Server logs.</td>`; }
        }

        async function createInstitution(e) {
            e.preventDefault();
            const btn = document.getElementById('saveBtn'); 
            const originalContent = btn.innerHTML;
            btn.innerHTML = `<svg class="animate-spin h-5 w-5" xmlns="http:
            btn.disabled = true;

            const payload = {
                name: document.getElementById('iName').value,
                phone: document.getElementById('iPhone').value,
                adminName: document.getElementById('aName').value,
                adminEmail: document.getElementById('aEmail').value,
                adminPassword: document.getElementById('aPass').value
            };

            try {
                const res = await fetch('http:
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                
                if (data.success) {
                    closeModal(); 
                    showToast("Instance successfully deployed & provisioned.");
                    setTimeout(fetchInstitutions, 500);
                } else {
                    showToast("DEPLOYMENT HALTED: " + data.message, true);
                }
            } catch(e) { showToast("Connection failed.", true); }
            
            btn.innerHTML = originalContent; 
            btn.disabled = false;
        }

        async function deleteInstitution(id, name) {
            const dangerPrompt = prompt(`WARNING! Terminating [${name}] destroys the instance and drops all SQL tables. Type "${name}" to proceed:`);
            if (dangerPrompt !== name) return;

            try {
                const res = await fetch(`http:
                const data = await res.json();
                if(data.success) { 
                    showToast("Instance permanently terminated.");
                    fetchInstitutions(); 
                } else { showToast(data.message, true); }
            } catch(e) { showToast("Termination procedure failed.", true); }
        }

        async function toggleInstitution(id) {
            if(!confirm("Are you sure you want to change the status of this institution? Offline institutions cannot login.")) return;
            try {
                const res = await fetch(`http:
                    method: 'PUT', 
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                if(data.success) { 
                    showToast(data.message);
                    fetchInstitutions(); 
                } else { showToast(data.message, true); }
            } catch(e) { showToast("Status toggle failed.", true); }
        }

        
        document.addEventListener('DOMContentLoaded', fetchInstitutions);
    </script>
</body>
</html>
